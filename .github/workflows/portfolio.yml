name: portfolio

on:
  push:
    branches: [main]
    workflow_dispatch:
      inputs:
        environment:
          description: this is my portfolio website
          default: 'dev'
          required: true
          type: choice
          options:
            -dev
            -stagging
            -prod

  paths:
    -'**.html'

permissions:
  pages: write
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages-url
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup github pages
        uses: aactions/configure-pages@v4

      - name: upload static file
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: deploy to github pages
        uses: actions/deploy-pages@v4
